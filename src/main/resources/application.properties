spring.application.name=ferrumgym
spring.mustache.suffix=.html

# 1. Database Connection (MySQL)
# Se conectará al MySQL local y creará la base de datos si no existe
spring.datasource.url=jdbc:mysql://localhost:3306/ferrum_db?allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
# IMPORTANTE: Aquí pon la contraseña de tu MySQL (si no tienes, déjalo vacío)
spring.datasource.password=root

# 2. Hibernate/JPA Configuration
# Esto creará las tablas de User, Activity, etc., automáticamente
spring.jpa.hibernate.ddl-auto=update
# Verás las consultas en la terminal de VS Code
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# 3. Server Configuration
# Puerto 8443 obligatorio
server.port=8443
# 4. Activar el HTTPS 
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password= ferrumGYM2026
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=ferrum

# 5: File Upload Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
