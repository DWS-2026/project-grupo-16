
<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Ferrum Gym - Your place for fitness, group classes, and personal training." />
        <meta name="author" content="Grupo 16" />
        <title>Home - Ferrum Gym</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="/css/styles.css" rel="stylesheet" />
		<link href="/css/admin.css" rel="stylesheet" />
    </head>
<body>

{{> fragments/navbar-admin }}

    <main class="container py-5">

        <div class="row mb-4 align-items-end">
            <div class="col-md-8">
                <label for="classSelector" class="form-label text-muted fw-bold text-uppercase small">Select Class to Manage</label>
                <div class="input-group input-group-lg">
                    <span class="input-group-text bg-white"><i class="bi bi-calendar3"></i></span>
                    <select class="form-select fw-bold" id="classSelector">
                        <option selected>CrossFit - Mon 17:00 (Trainer 1)</option>
                        <option>BodyPump - Mon 18:00 (Trainer 2)</option>
                        <option>Yoga - Mon 19:00 (Trainer 3)</option>
                        <option>Spinning - Mon 20:00 (Trainer 4)</option>
                        <option>HIIT - Tue 17:00 (Trainer 5)</option>
                    </select>
                    <button class="btn btn-primary">Load List</button>
                </div>
            </div>
            <div class="col-md-4 text-md-end mt-3 mt-md-0">
                <div class="card bg-light border-0">
                    <div class="card-body py-2">
                        <div class="small text-muted text-uppercase fw-bold">Occupancy</div>
                        <div class="fs-2 fw-bold text-success">15 / 25</div>
                        <div class="progress" style="height: 5px;">
                            <div class="progress-bar bg-success" role="progressbar" style="width: 60%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <hr class="mb-4">

        <div class="d-flex justify-content-between mb-3">
            <div class="input-group w-50">
                <input type="text" class="form-control" placeholder="Search user in this list...">
                <button class="btn btn-outline-secondary"><i class="bi bi-search"></i></button>
            </div>
            <div>
                <button class="btn btn-success" onclick="alert('Attendance saved successfully!')"><i class="bi bi-save"></i> Save Changes</button>
                <button class="btn btn-outline-dark"><i class="bi bi-printer"></i> Print</button>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="bg-light">
                            <tr>
                                <th class="ps-4">#</th>
                                <th>User</th>
                                <th>Membership Level</th> <th>Status</th>
                                <th class="text-end pe-4">Attendance</th>
                            </tr>
                        </thead>
                        <tbody>
                                {{#users}}
                                <tr>
                                    <td class="align-middle text-center">
                                        <img src="/user/{{id}}/image" class="rounded-circle" style="width: 45px; height: 45px; object-fit: cover;" alt="{{name}}">
                                    </td>
                                    <td class="align-middle">
                                        <div class="fw-bold">{{name}}</div>
                                    </td>
                                    <td class="align-middle">
                                        {{email}}
                                    </td>
                                    <td class="align-middle">
                                        {{#roles}}
                                        <span class="badge bg-info text-dark me-1">{{.}}</span>
                                        {{/roles}}
                                    </td>
                                    <td class="align-middle text-end">
                                        <div class="btn-group">
                                            <a href="/admin/user/edit/{{id}}" class="btn btn-sm btn-outline-primary">
                                                <i class="bi bi-pencil"></i> Edit
                                            </a>
                                            <a href="/admin/user/delete/{{id}}" class="btn btn-sm btn-outline-danger" 
                                            onclick="return confirm('Are you sure you want to delete this user?')">
                                                <i class="bi bi-trash"></i> Delete
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                                {{/users}}

                                {{^users}}
                                <tr>
                                    <td colspan="5" class="text-center py-4 text-muted">
                                        <i class="bi bi-people fs-2 d-block mb-2"></i>
                                        No users registered yet.
                                    </td>
                                </tr>
                                {{/users}}
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="card-footer bg-light text-muted small">
                Showing 4 of 15 attendees
            </div>
        </div>

    </main>
		{{> fragments/footer }}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
