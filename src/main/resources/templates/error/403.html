<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="403 Access Denied - Ferrum Gym" />
        <meta name="author" content="Grupo 16" />
        <title>403 Access Denied - Ferrum Gym</title>
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="/css/styles.css" rel="stylesheet" />
    </head>
    <body>
        {{> fragments/header }}

        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Error 403</h1>
                    <p class="lead fw-normal text-white-50 mb-0">Access Denied</p>
                </div>
            </div>
        </header>

        <section class="py-5">
            <div class="container px-4 px-lg-5 mt-5 mb-5">
                <div class="row justify-content-center">
                    <div class="col-lg-6 text-center">
                        <i class="bi bi-shield-lock-fill display-1 text-danger mb-4 d-block"></i>
                        <h2 class="fw-bolder">Restricted Area</h2>
                        <p class="lead text-muted mb-5">
                            You do not have the necessary permissions to view this page.
                            If you believe this is a mistake, please contact the administrator.
                        </p>
                        <a class="btn btn-outline-dark btn-lg" href="/">
                            <i class="bi bi-house-door me-2"></i>Return Home
                        </a>
                    </div>
                </div>
            </div>
        </section>

        {{> fragments/footer }}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/js/scripts.js"></script>
    </body>
</html>
