<!DOCTYPE html>
<html lang="en">
<head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Ferrum Gym - Your place for fitness, group classes, and personal training." />
        <meta name="author" content="Grupo 16" />
        <title>Home - Ferrum Gym</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="/css/styles.css" rel="stylesheet" />
		<link href="/css/admin.css" rel="stylesheet" />
    </head>
<body>

{{> fragments/navbar-admin }}

 <main class="container py-5">
        <div class="row mb-4">
            <div class="col-12">
                <h1>Site Settings</h1>
                <p class="text-muted">Manage global configurations for the gym website.</p>
            </div>
        </div>

		<div class="row">
            <div class="col-md-3 mb-4">
                <div class="list-group shadow-sm sticky-top" style="top: 2rem;">
                    <a href="#general" class="list-group-item list-group-item-action active" aria-current="true">General Info</a>
                    <a href="#hours" class="list-group-item list-group-item-action">Business Hours</a>
                </div>
        </div>

            <div class="col-md-9">
                <form action="/site-settings" method="POST">

                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-white fw-bold py-3" id="general">General Information</div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="gymName" class="form-label">Gym Name</label>
                                <input type="text" class="form-control" id="gymName" name="gymName" value="{{settings.gymName}}" required>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="contactEmail" class="form-label">Contact Email</label>
                                    <input type="email" class="form-control" id="contactEmail" name="contactEmail" value="{{settings.contactEmail}}" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="contactPhone" class="form-label">Phone Number</label>
                                    <input type="text" class="form-control" id="contactPhone" name="contactPhone" value="{{settings.contactPhone}}" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label for="gymAddress" class="form-label">Address</label>
                                <textarea class="form-control" id="gymAddress" name="address" rows="2" required>{{settings.address}}</textarea>
                            </div>
                        </div>
                    </div>

                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-header bg-white fw-bold py-3" id="hours">Business Hours</div>
                        <div class="card-body">
                            <div class="row align-items-center mb-2">
                                <div class="col-4">Weekdays</div>
                                <div class="col-8">
                                    <input type="text" class="form-control form-control-sm" name="weekdaysHours" value="{{settings.weekdaysHours}}" required>
                                </div>
                            </div>
                            <div class="row align-items-center">
                                <div class="col-4">Weekends</div>
                                <div class="col-8">
                                    <input type="text" class="form-control form-control-sm" name="weekendsHours" value="{{settings.weekendsHours}}" required>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                        <a href="/admin-dashboard" class="btn btn-outline-secondary me-md-2">Cancel</a>
                        <button class="btn btn-primary" type="submit">Save Changes</button>
                    </div>
                </form>
                </div>
        </div>
    </main>

		{{> fragments/footer }}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
