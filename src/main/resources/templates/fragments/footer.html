                <p class="small text-muted mb-0">
                    <i class="bi bi-geo-alt-fill me-2 text-primary"></i>{{settings.address}}
                </p>
            </div>

            <div class="col-md-4 mb-4 mb-md-0">
                <h5 class="text-uppercase fw-bold mb-3">Contact Us</h5>

                    <li class="mb-2"><i class="bi bi-telephone-fill me-2 text-primary"></i>{{settings.contactPhone}}</li>
                    <li><i class="bi bi-envelope-fill me-2 text-primary"></i>{{settings.contactEmail}}</li>

            <div class="col-md-4">

        <div class="row align-items-center">
            <div class="col-12 text-center text-muted small">
