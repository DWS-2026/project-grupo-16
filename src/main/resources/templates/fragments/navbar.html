<script>
    document.addEventListener("DOMContentLoaded", function() {
        const currentPath = window.location.pathname;
        const navLinks = document.querySelectorAll(".public-nav-link");

        navLinks.forEach(link => {
            // If the link's href matches the current path, add "fw-bold" and "active" classes; otherwise, remove them
            if (link.getAttribute("href") === currentPath) {
                link.classList.add("fw-bold", "active");
            } else {
                link.classList.remove("fw-bold", "active");
            }
        });
    });
</script>
