<nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
    <div class="container px-4 px-lg-5">
        <a class="navbar-brand fw-bold" href="/admin-dashboard">Ferrum Gym | Admin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAdmin">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navAdmin">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                <li class="nav-item"><a class="nav-link" href="/">View Public Site</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin-dashboard">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/site-settings">Settings</a></li>
                <li class="nav-item"><a class="nav-link" href="/admin-class">Classes</a></li>
            </ul>
            <div class="d-flex align-items-center">
                <span class="me-3 text-muted small">Welcome, {{adminName}}</span>
                <a href="/logout" class="btn btn-outline-danger btn-sm">Log Out</a>
            </div>
        </div>
    </div>
</nav>

<script>
    document.addEventListener("DOMContentLoaded", function() {
		// Obtain the current path and all nav links
        const currentPath = window.location.pathname;
		// Select all links with the class "nav-link" inside the navbar
        const navLinks = document.querySelectorAll(".nav-link");

        // Loop through each link and compare its href to the current path
        navLinks.forEach(link => {
            // If the link's href matches the current path, add "fw-bold" and "active" classes; otherwise, remove them
            if (link.getAttribute("href") === currentPath) {
                link.classList.add("fw-bold", "active");
            } else {
                link.classList.remove("fw-bold", "active");
            }
        });
    });
</script>
