<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Ferrum Gym - Your place for fitness, group classes, and personal training." />
        <meta name="author" content="Grupo 16" />
        <title>Home - Ferrum Gym</title>
        <!-- Favicon-->
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <!-- Bootstrap icons-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <!-- Core theme CSS (includes Bootstrap)-->
        <link href="/css/styles.css" rel="stylesheet" />
    </head>
    <body>
        <!-- Navigation-->
        {{> fragments/header }}
        <!-- Login-->
        <section class="py-5 bg-light">
            <div class="container px-4 px-lg-5 mt-5">
                <div class="row justify-content-center">
                    <div class="col-lg-5">
                        <div class="card shadow-lg border-0 rounded-lg mt-5">
                            <div class="card-header bg-dark text-white">
                                <h3 class="text-center font-weight-light my-4">User Access</h3>
                            </div>
                            <div class="card-body">
                                <form action="/login" method="POST">
                                    <div class="form-floating mb-3">
                                        <input class="form-control" name="username" id="inputEmail" type="email" placeholder="name@example.com" required />
                                        <label for="inputEmail">Email</label>
                                    </div>
                                    
                                    <div class="form-floating mb-3">
                                        <input class="form-control" name="password" id="inputPassword" type="password" placeholder="Password" required />
                                        <label for="inputPassword">Password</label>
                                    </div>
                                    
                                    <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                                        <a class="small text-muted" href="/forgot-password">Forgot your password?</a>
                                        <button type="submit" class="btn btn-primary px-4">Enter</button>
                                    </div>
                                </form>
                            </div>
                            
                            <div class="card-footer text-center py-3">
                                <div class="small">
                                    Don't you have an account? 
                                    <a href="/register" class="text-primary fw-bold">Register here!</a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <!-- Footer-->
        {{> fragments/footer }}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/js/scripts.js"></script>
    </body>
</html>
