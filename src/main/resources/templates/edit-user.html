<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
        <meta name="description" content="Ferrum Gym - Admin User Management." />
        <meta name="author" content="Grupo 16" />
        <title>Edit User - Ferrum Gym Admin</title>
        <link rel="icon" type="image/x-icon" href="/assets/favicon.ico" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
        <link href="/css/styles.css" rel="stylesheet" />
    </head>
    <body>
        {{> fragments/header }}

        <header class="bg-dark py-5">
            <div class="container px-4 px-lg-5 my-5">
                <div class="text-center text-white">
                    <h1 class="display-4 fw-bolder">Edit User Profile</h1>
                    <p class="lead fw-normal text-white-50 mb-0">Manage details and permissions for {{user.username}}</p>
                </div>
            </div>
        </header>

        <section class="py-5">
            <div class="container px-4 px-lg-5 mt-5">
                <div class="row justify-content-center">
                    <div class="col-lg-8">
                        <div class="card shadow-sm">
                            <div class="card-body p-5">
                                <form action="/admin/user/edit/{{user.id}}" method="POST" enctype="multipart/form-data">
                                    <input type="hidden" name="id" value="{{user.id}}">

                                    <div class="row mb-4">
                                        <div class="col-md-4 text-center border-end">
                                            <label class="form-label d-block fw-bold mb-3">Profile Picture</label>
                                            <img src="/user/{{user.id}}/image" alt="User Avatar" class="rounded-circle img-fluid mb-3" style="width: 120px; height: 120px; object-fit: cover;">
                                            <input type="file" class="form-control form-control-sm" id="userAvatarInput" name="userAvatar">
                                            <div class="form-text small">Upload a new JPG or PNG file.</div>
                                        </div>

                                        <div class="col-md-8 ps-md-4">
                                            <div class="mb-3">
                                                <label for="inputUsername" class="form-label fw-bold">Username</label>
                                                <input type="text" class="form-control" name="username" value="{{user.username}}" required>
                                            </div>
                                            <div class="mb-3">
                                                <label for="inputEmail" class="form-label fw-bold">Email Address</label>
                                                <input type="email" class="form-control" name="email" value="{{user.email}}" required>
                                            </div>

                                            <div class="mb-3">
                                                <label for="inputRole" class="form-label fw-bold">User Role</label>
                                                <select class="form-select" name="role" id="inputRole">
                                                    <option value="USER">Member (USER)</option>
                                                    <option value="ADMIN">Administrator (ADMIN)</option>
                                                </select>
                                                <div class="form-text small text-muted">Warning: Giving ADMIN rights allows full system access.</div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="d-flex justify-content-end border-top pt-4">
                                        <a href="/admin-dashboard" class="btn btn-outline-secondary me-2">Cancel</a>
                                        <button type="submit" class="btn btn-primary">Save Changes</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        {{> fragments/footer }}

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="/js/scripts.js"></script>
    </body>
</html>
