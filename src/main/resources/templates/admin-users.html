<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>Manage Users - Ferrum Gym</title>
    <link href="/css/styles.css" rel="stylesheet" />
    <link href="/css/admin.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    {{> fragments/navbar-admin }}

    <main class="container py-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-0 text-gray-800">User Management</h1>
                <p class="text-muted">View, edit, and remove gym members and staff.</p>
            </div>
            <a href="/register" class="btn btn-primary shadow-sm">
                <i class="bi bi-person-plus me-1"></i> Add new user
            </a>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="bg-dark text-white">
                            <tr>
                                <th class="text-center" style="width: 80px;">Avatar</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Roles</th>
                                <th class="text-end pe-4">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            {{#users}}
                            <tr>
                                <td class="align-middle text-center">
                                    <img src="/user/{{id}}/image" class="rounded-circle shadow-sm" style="width: 45px; height: 45px; object-fit: cover;" alt="{{name}}" onerror="this.src='/assets/foto.avif'">
                                </td>
                                <td class="align-middle">
                                    <div class="fw-bold">{{name}}</div>
                                </td>
                                <td class="align-middle text-muted">
                                    {{email}}
                                </td>
                                <td class="align-middle">
                                    {{#roles}}
                                    <span class="badge bg-info text-dark me-1"><i class="bi bi-shield-check me-1"></i>{{.}}</span>
                                    {{/roles}}
                                </td>
                                <td class="align-middle text-end pe-4">
                                    <div class="btn-group">
                                        <a href="/admin/user/edit/{{id}}" class="btn btn-sm btn-outline-primary">
                                            <i class="bi bi-pencil"></i> Edit
                                        </a>
                                        <a href="/admin/user/delete/{{id}}" class="btn btn-sm btn-outline-danger"
                                        onclick="return confirm('Are you sure you want to delete this user? This action cannot be undone.')">
                                            <i class="bi bi-trash"></i> Delete
                                        </a>
                                    </div>
                                </td>
                            </tr>
                            {{/users}}

                            {{^users}}
                            <tr>
                                <td colspan="5" class="text-center py-5 text-muted">
                                    <i class="bi bi-people fs-1 d-block mb-2"></i>
                                    No users registered yet.
                                </td>
                            </tr>
                            {{/users}}
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    {{> fragments/footer }}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
